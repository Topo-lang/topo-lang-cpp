# topo-lang-cpp/topo-check/analysis/catalog/CppSafePatterns.toml
# C++ safety patterns whitelist — community-maintained
# Non-external functions may only use listed patterns.
# Unlisted = unsafe by default.

[version]
schema = 1

# Safe C++ language constructs
[constructs]
safe = [
    "if", "else", "for", "while", "do", "switch", "case", "default",
    "break", "continue", "return",
    "auto", "const", "constexpr", "consteval", "constinit",
    "static_cast", "sizeof", "alignof", "decltype", "typeid",
    "try", "catch", "throw",
    "using", "typedef", "namespace",
    "template", "typename", "concept", "requires",
    "noexcept", "explicit", "inline", "virtual", "override", "final",
    "enum", "struct", "class",
    "nullptr", "true", "false",
    "this", "static", "mutable",
    "co_await", "co_yield", "co_return",
]

unsafe = [
    "reinterpret_cast", "const_cast",
    "asm", "__asm__", "__asm",
    "volatile",
    "goto",
    "register",
    "union",
    "thread_local",
]

# Safe standard library headers (#include whitelist)
[headers]
safe = [
    # Containers
    "vector", "array", "deque", "list", "forward_list",
    "map", "set", "unordered_map", "unordered_set",
    "queue", "stack", "bitset",
    # Algorithms & utilities
    "algorithm", "numeric", "functional", "iterator",
    "utility", "tuple", "optional", "variant", "any",
    "string", "string_view", "charconv",
    "memory",
    "type_traits", "typeinfo", "typeindex",
    "concepts", "ranges", "span",
    "initializer_list", "compare",
    # Math & numerics
    "cmath", "complex", "valarray", "numbers", "ratio",
    "limits", "climits", "cfloat", "cstdint", "cstddef",
    "cinttypes", "bit",
    # String handling
    "cstring", "cctype", "cwchar", "cwctype",
    # Exceptions
    "exception", "stdexcept", "system_error",
    "cassert",
    # Formatting
    "format", "locale", "iomanip", "ios", "iosfwd",
    "sstream",
    # Other safe
    "random", "regex", "chrono",
    "source_location", "version",
    "coroutine",
    "expected",
    "mdspan",
    "print",
]

# Default policy for non-whitelisted headers
[headers.policy]
system = "deny"       # <header> not in safe list -> UnsafeLevel::System
user = "recursive"    # "header" (user quotes) -> scan its content recursively

